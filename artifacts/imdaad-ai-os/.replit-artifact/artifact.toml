kind = "web"
previewPath = "/"
title = "Imdaad AI-OS"
version = "1.0.0"
id = "artifacts/imdaad-ai-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26184

[services.development]
run = "pnpm --filter @workspace/imdaad-ai-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imdaad-ai-os", "run", "build" ]
publicDir = "artifacts/imdaad-ai-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26184"
BASE_PATH = "/"
