kind = "web"
previewPath = "/"
title = "Imdaad AI-OS"
version = "1.0.0"
id = "artifacts/imdaad-ai-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26184

[services.development]
run = "pnpm --filter @workspace/imdaad-ai-os run dev"

[services.env]
PORT = "26184"
BASE_PATH = "/"

[services.production]
serve = "static"
publicDir = "artifacts/imdaad-ai-os/dist/public"

[services.production.build]
args = ["sh", "-c", "pnpm install --frozen-lockfile && pnpm --filter @workspace/imdaad-ai-os run build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "26184"
BASE_PATH = "/"
